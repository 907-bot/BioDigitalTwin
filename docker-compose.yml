services:

  # ── API Gateway (monolith, backward-compatible) ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/biodigital
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - neo4j
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Microservices ──
  ontology-svc:
    build:
      context: .
      dockerfile: services/ontology-svc/Dockerfile
    ports:
      - "8010:8000"
    depends_on: []

  knowledge-svc:
    build:
      context: .
      dockerfile: services/knowledge-svc/Dockerfile
    ports:
      - "8011:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/biodigital
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis

  patient-svc:
    build:
      context: .
      dockerfile: services/patient-svc/Dockerfile
    ports:
      - "8012:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/biodigital
    depends_on:
      - postgres
      - neo4j

  twin-svc:
    build:
      context: .
      dockerfile: services/twin-svc/Dockerfile
    ports:
      - "8013:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/biodigital
    depends_on:
      - postgres

  agent-svc:
    build:
      context: .
      dockerfile: services/agent-svc/Dockerfile
    ports:
      - "8014:8000"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  narrative-svc:
    build:
      context: .
      dockerfile: services/narrative-svc/Dockerfile
    ports:
      - "8015:8000"
    depends_on: []

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  # ── Data Stores ──
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: biodigital
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
